# 可选依赖（Caker 本身用宿主机 uvicorn 启动，见 README）
#
# 本地跟写默认只需进程内 Chroma；一般不必启 compose：
#   docker compose --profile optional up -d chroma
#
# postgres / minio 为原生产向可选组件，profile optional

services:
  postgres:
    profiles: ["optional"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_skills
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_skills"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    profiles: ["optional"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  chroma:
    profiles: ["optional"]
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma

volumes:
  pgdata:
  miniodata:
  chromadata:
