<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caker</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              gray: {
                850: "#262626",
                950: "#0a0a0a",
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <style>
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .message-content {
        word-break: break-word;
      }
      .message-content.user-plain {
        white-space: pre-wrap;
      }
      .message-content.md-body p {
        margin: 0.5em 0;
      }
      .message-content.md-body p:first-child {
        margin-top: 0;
      }
      .message-content.md-body ul,
      .message-content.md-body ol {
        margin: 0.5em 0;
        padding-left: 1.25rem;
      }
      .message-content.md-body pre {
        margin: 0.5em 0;
        overflow-x: auto;
        border-radius: 0.5rem;
        padding: 0.75rem;
        font-size: 0.8125rem;
        background: rgba(0, 0, 0, 0.06);
      }
      .dark .message-content.md-body pre {
        background: rgba(255, 255, 255, 0.08);
      }
      .message-content.md-body code {
        font-size: 0.875em;
      }
      .message-content.md-body :not(pre) > code {
        padding: 0.1em 0.35em;
        border-radius: 0.25rem;
        background: rgba(0, 0, 0, 0.06);
      }
      .dark .message-content.md-body :not(pre) > code {
        background: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body
    class="h-full bg-white text-gray-900 dark:bg-[#171717] dark:text-gray-100"
  >
    <div id="health-banner" class="hidden bg-amber-100 text-amber-900 dark:bg-amber-900/40 dark:text-amber-100 px-4 py-2 text-sm text-center">
      无法连接后端，请确认 uvicorn 已启动。
    </div>

    <div class="flex h-[100dvh] overflow-hidden">
      <div
        id="sidebar-overlay"
        class="fixed inset-0 z-30 bg-black/40 hidden md:hidden"
        aria-hidden="true"
      ></div>

      <aside
        id="sidebar"
        class="fixed md:static inset-y-0 left-0 z-40 flex h-full min-h-0 w-72 flex-col overflow-hidden border-e border-gray-100 bg-gray-50 dark:border-gray-850/50 dark:bg-gray-950 -translate-x-full md:translate-x-0 transition-transform duration-200"
      >
        <div class="flex items-center gap-2 px-3 pt-3 pb-2">
          <div
            class="flex size-8 items-center justify-center rounded-xl bg-gray-900 text-sm font-semibold text-white dark:bg-gray-100 dark:text-gray-900"
          >
            C
          </div>
          <span class="text-lg font-semibold tracking-tight">Caker</span>
          <button
            id="btn-close-sidebar"
            type="button"
            class="md:hidden ml-auto rounded-lg p-1.5 hover:bg-gray-200 dark:hover:bg-gray-850"
            aria-label="关闭侧栏"
          >
            ✕
          </button>
        </div>

        <div class="px-2 pb-2">
          <button
            id="btn-new-chat"
            type="button"
            class="flex w-full items-center gap-3 rounded-2xl px-2.5 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-900 transition"
          >
            <span class="text-base">✎</span>
            <span>新对话</span>
          </button>
        </div>

        <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-0.5 min-h-0"></div>

        <div
          id="sidebar-footer"
          class="relative z-10 shrink-0 border-t border-gray-100 bg-gray-50 p-3 space-y-2 dark:border-gray-850/50 dark:bg-gray-950"
        >
          <button
            id="btn-toggle-users"
            type="button"
            class="flex w-full items-center justify-between rounded-xl px-2 py-1.5 text-xs font-medium text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-900"
          >
            <span>用户</span>
            <span id="users-chevron" class="text-gray-400">▼</span>
          </button>
          <div id="user-list" class="space-y-0.5 max-h-40 overflow-y-auto"></div>
          <div id="add-user-row" class="flex gap-1.5">
            <input
              id="input-new-user"
              type="text"
              autocomplete="off"
              placeholder="新用户 ID"
              class="min-w-0 flex-1 rounded-xl border border-gray-200 bg-white px-2.5 py-1.5 text-xs dark:border-gray-800 dark:bg-gray-900 outline-none focus:ring-2 focus:ring-gray-300 dark:focus:ring-gray-700"
            />
            <button
              id="btn-add-user"
              type="button"
              class="shrink-0 rounded-xl bg-gray-900 px-2.5 py-1.5 text-xs text-white hover:bg-gray-800 dark:bg-gray-100 dark:text-gray-900 dark:hover:bg-gray-200"
            >
              添加
            </button>
          </div>
          <button
            id="btn-settings"
            type="button"
            class="flex w-full items-center gap-2 rounded-xl px-2 py-1.5 text-sm text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-900"
          >
            ⚙ 设置
          </button>
        </div>
      </aside>

      <main class="flex min-w-0 flex-1 flex-col">
        <header
          class="flex items-center gap-3 border-b border-gray-100 px-4 py-3 dark:border-gray-850/50"
        >
          <button
            id="btn-open-sidebar"
            type="button"
            class="md:hidden rounded-lg p-2 hover:bg-gray-100 dark:hover:bg-gray-850"
            aria-label="打开侧栏"
          >
            ☰
          </button>
          <h1 id="chat-title" class="flex-1 truncate text-sm font-medium">新对话</h1>
          <label
            class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400 cursor-pointer"
          >
            <input id="toggle-streaming" type="checkbox" class="rounded" checked />
            流式
          </label>
          <span
            id="status-dot"
            class="size-2 rounded-full bg-gray-300 dark:bg-gray-600"
            title="连接状态"
          ></span>
        </header>

        <div class="relative flex-1 overflow-hidden">
          <div
            id="empty-state"
            class="absolute inset-0 flex flex-col items-center justify-center px-4 text-center text-gray-400 dark:text-gray-500 pointer-events-none"
          >
            <p class="text-2xl font-medium text-gray-800 dark:text-gray-200 mb-2">Caker</p>
            <p class="text-sm max-w-md">
              基于 LangGraph 的 Agent Skills 运行时。支持文件读写、脚本执行与技能扩展；会话数据保存在服务端 <code class="text-xs">var/web/</code>，换浏览器连接同一后端即可继续。
            </p>
          </div>
          <div id="messages" class="h-full overflow-y-auto px-4 py-6"></div>
        </div>

        <div class="border-t border-gray-100 dark:border-gray-850/50 p-4">
          <div class="mx-auto max-w-3xl">
            <p
              id="stream-status"
              class="mb-2 hidden text-xs text-gray-500 dark:text-gray-400"
            ></p>
            <div
              id="attachment-bar"
              class="mb-2 hidden flex flex-wrap gap-2"
            ></div>
            <div
              class="flex items-end gap-2 rounded-2xl border border-gray-200 bg-white px-3 py-2 shadow-sm dark:border-gray-800 dark:bg-gray-900"
            >
              <input
                id="file-input"
                type="file"
                multiple
                class="hidden"
              />
              <button
                id="btn-attach"
                type="button"
                title="添加文件"
                class="shrink-0 rounded-xl px-2.5 py-2 text-lg leading-none text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-850"
              >
                +
              </button>
              <textarea
                id="composer"
                rows="1"
                placeholder="输入消息… Enter 发送，Shift+Enter 换行"
                class="max-h-40 min-h-[2.5rem] flex-1 resize-none bg-transparent py-2 text-sm outline-none"
              ></textarea>
              <button
                id="btn-stop"
                type="button"
                class="hidden shrink-0 rounded-xl px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-850"
              >
                停止
              </button>
              <button
                id="btn-send"
                type="button"
                class="shrink-0 rounded-xl bg-gray-900 px-4 py-2 text-sm font-medium text-white hover:bg-gray-800 disabled:opacity-40 dark:bg-gray-100 dark:text-gray-900 dark:hover:bg-gray-200"
              >
                发送
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div
      id="settings-modal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4"
      role="dialog"
      aria-modal="true"
    >
      <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl dark:bg-gray-900">
        <h2 class="text-lg font-semibold mb-4">设置</h2>
        <div class="space-y-4 text-sm">
          <label class="flex items-center justify-between gap-4">
            <span>流式输出</span>
            <input id="settings-streaming" type="checkbox" class="rounded" />
          </label>
          <label class="block">
            <span class="text-gray-500 dark:text-gray-400">主题</span>
            <select
              id="settings-theme"
              class="mt-1 w-full rounded-xl border border-gray-200 bg-white px-3 py-2 dark:border-gray-800 dark:bg-gray-950"
            >
              <option value="system">跟随系统</option>
              <option value="light">浅色</option>
              <option value="dark">深色</option>
            </select>
          </label>
        </div>
        <div class="mt-6 flex justify-end">
          <button
            id="btn-settings-close"
            type="button"
            class="rounded-xl px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-850"
          >
            关闭
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
